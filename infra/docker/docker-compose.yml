version: "3.9"

services:
  argus-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: ../../.env
    environment:
      - ARGUS_DB_PATH=/data/argus.db
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
    volumes:
      - argus-data:/data
      - argus-snapshots:/snapshots
      - argus-videos:/videos
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  argus-worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file: ../../.env
    environment:
      - ARGUS_DB_PATH=/data/argus.db
      - REDIS_HOST=redis
    volumes:
      - argus-data:/data
      - argus-snapshots:/snapshots
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:2-pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=argus
      - POSTGRES_USER=argus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-argus_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "${RTSP_PORT:-8554}:8554"
      - "${RTMP_PORT:-1935}:1935"
      - "${HLS_PORT:-8888}:8888"
      - "${WEBRTC_PORT:-8889}:8889"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped

volumes:
  argus-data:
  argus-snapshots:
  argus-videos:
  redis-data:
  qdrant-data:
  postgres-data:
  grafana-data:
  prometheus-data:
  loki-data:
